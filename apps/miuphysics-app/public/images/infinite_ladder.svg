<svg viewBox="0 0 460 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1E1E2E" rx="8"/>
  
  <!-- Terminal A -->
  <circle cx="30" cy="40" r="5" fill="#F38BA8"/>
  <text x="25" y="25" fill="#CDD6F4" font-size="16" font-family="Arial" font-weight="bold">A</text>
  
  <!-- Terminal B -->
  <circle cx="30" cy="140" r="5" fill="#F38BA8"/>
  <text x="25" y="160" fill="#CDD6F4" font-size="16" font-family="Arial" font-weight="bold">B</text>
  
  <!-- Top rail segment 1 -->
  <line x1="30" y1="40" x2="70" y2="40" stroke="#CDD6F4" stroke-width="3"/>
  <rect x="70" y="25" width="40" height="30" fill="#313244" stroke="#89B4FA" stroke-width="3" rx="4"/>
  <text x="85" y="45" fill="#89B4FA" font-size="14" font-family="Arial" font-weight="bold">R</text>
  <line x1="110" y1="40" x2="160" y2="40" stroke="#CDD6F4" stroke-width="3"/>
  
  <!-- Bottom rail segment 1 -->
  <line x1="30" y1="140" x2="160" y2="140" stroke="#CDD6F4" stroke-width="3"/>
  
  <!-- Shunt resistor 1 -->
  <circle cx="160" cy="40" r="4" fill="#CDD6F4"/>
  <circle cx="160" cy="140" r="4" fill="#CDD6F4"/>
  <line x1="160" y1="40" x2="160" y2="65" stroke="#CDD6F4" stroke-width="3"/>
  <rect x="145" y="65" width="30" height="50" fill="#313244" stroke="#89B4FA" stroke-width="3" rx="4"/>
  <text x="155" y="95" fill="#89B4FA" font-size="14" font-family="Arial" font-weight="bold">R</text>
  <line x1="160" y1="115" x2="160" y2="140" stroke="#CDD6F4" stroke-width="3"/>
  
  <!-- Top rail segment 2 -->
  <line x1="160" y1="40" x2="190" y2="40" stroke="#CDD6F4" stroke-width="3"/>
  <rect x="190" y="25" width="40" height="30" fill="#313244" stroke="#89B4FA" stroke-width="3" rx="4"/>
  <text x="205" y="45" fill="#89B4FA" font-size="14" font-family="Arial" font-weight="bold">R</text>
  <line x1="230" y1="40" x2="280" y2="40" stroke="#CDD6F4" stroke-width="3"/>
  
  <!-- Bottom rail segment 2 -->
  <line x1="160" y1="140" x2="280" y2="140" stroke="#CDD6F4" stroke-width="3"/>
  
  <!-- Shunt resistor 2 -->
  <circle cx="280" cy="40" r="4" fill="#CDD6F4"/>
  <circle cx="280" cy="140" r="4" fill="#CDD6F4"/>
  <line x1="280" y1="40" x2="280" y2="65" stroke="#CDD6F4" stroke-width="3"/>
  <rect x="265" y="65" width="30" height="50" fill="#313244" stroke="#89B4FA" stroke-width="3" rx="4"/>
  <text x="275" y="95" fill="#89B4FA" font-size="14" font-family="Arial" font-weight="bold">R</text>
  <line x1="280" y1="115" x2="280" y2="140" stroke="#CDD6F4" stroke-width="3"/>
  
  <!-- Top rail segment 3 -->
  <line x1="280" y1="40" x2="310" y2="40" stroke="#CDD6F4" stroke-width="3"/>
  <rect x="310" y="25" width="40" height="30" fill="#313244" stroke="#89B4FA" stroke-width="3" rx="4"/>
  <text x="325" y="45" fill="#89B4FA" font-size="14" font-family="Arial" font-weight="bold">R</text>
  <line x1="350" y1="40" x2="400" y2="40" stroke="#CDD6F4" stroke-width="3"/>
  
  <!-- Bottom rail segment 3 -->
  <line x1="280" y1="140" x2="400" y2="140" stroke="#CDD6F4" stroke-width="3"/>
  
  <!-- Shunt resistor 3 -->
  <circle cx="400" cy="40" r="4" fill="#CDD6F4"/>
  <circle cx="400" cy="140" r="4" fill="#CDD6F4"/>
  <line x1="400" y1="40" x2="400" y2="65" stroke="#CDD6F4" stroke-width="3"/>
  <rect x="385" y="65" width="30" height="50" fill="#313244" stroke="#89B4FA" stroke-width="3" rx="4"/>
  <text x="395" y="95" fill="#89B4FA" font-size="14" font-family="Arial" font-weight="bold">R</text>
  <line x1="400" y1="115" x2="400" y2="140" stroke="#CDD6F4" stroke-width="3"/>
  
  <!-- Infinite continuation dots -->
  <line x1="400" y1="40" x2="420" y2="40" stroke="#CDD6F4" stroke-dasharray="4,4" stroke-width="3"/>
  <line x1="400" y1="140" x2="420" y2="140" stroke="#CDD6F4" stroke-dasharray="4,4" stroke-width="3"/>
  
  <text x="425" y="45" fill="#CDD6F4" font-size="20" font-family="Arial" font-weight="bold">...</text>
  <text x="425" y="145" fill="#CDD6F4" font-size="20" font-family="Arial" font-weight="bold">...</text>
</svg>
