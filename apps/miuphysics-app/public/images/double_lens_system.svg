<svg viewBox="0 0 480 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1E1E2E" rx="8"/>
  
  <!-- Principal Axis -->
  <line x1="20" y1="120" x2="460" y2="120" stroke="#CDD6F4" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="440" y="110" fill="#CDD6F4" font-size="12" font-family="Arial" font-style="italic">x</text>
  
  <!-- Lens 1 (L1) at x = 150 -->
  <line x1="150" y1="30" x2="150" y2="210" stroke="#89B4FA" stroke-width="3"/>
  <!-- Arrows for converging lens L1 -->
  <path d="M 145 40 L 150 30 L 155 40 M 145 200 L 150 210 L 155 200" fill="none" stroke="#89B4FA" stroke-width="3"/>
  <text x="142" y="25" fill="#89B4FA" font-size="14" font-family="Arial" font-weight="bold">L₁</text>
  <circle cx="150" cy="120" r="3" fill="#CDD6F4"/>
  <text x="153" y="135" fill="#CDD6F4" font-size="11" font-family="Arial">O₁</text>
  
  <!-- Lens 2 (L2) at x = 310 -->
  <line x1="310" y1="30" x2="310" y2="210" stroke="#89B4FA" stroke-width="3"/>
  <!-- Arrows for L2 -->
  <path d="M 305 40 L 310 30 L 315 40 M 305 200 L 310 210 L 315 200" fill="none" stroke="#89B4FA" stroke-width="3"/>
  <text x="302" y="25" fill="#89B4FA" font-size="14" font-family="Arial" font-weight="bold">L₂</text>
  <circle cx="310" cy="120" r="3" fill="#CDD6F4"/>
  <text x="313" y="135" fill="#CDD6F4" font-size="11" font-family="Arial">O₂</text>
  
  <!-- Foci L1 (f1 = 10cm -> 40px) -->
  <!-- F1 at x = 110 -->
  <circle cx="110" cy="120" r="3" fill="#89B4FA"/>
  <text x="105" y="135" fill="#89B4FA" font-size="10" font-family="Arial">F₁</text>
  <!-- F'1 at x = 190 -->
  <circle cx="190" cy="120" r="3" fill="#89B4FA"/>
  <text x="185" y="135" fill="#89B4FA" font-size="10" font-family="Arial">F'₁</text>
  
  <!-- Foci L2 (f2 = 20cm -> 80px) -->
  <!-- F2 at x = 230 -->
  <circle cx="230" cy="120" r="3" fill="#89B4FA"/>
  <text x="225" y="135" fill="#89B4FA" font-size="10" font-family="Arial">F₂</text>
  <!-- F'2 at x = 390 -->
  <circle cx="390" cy="120" r="3" fill="#89B4FA"/>
  <text x="385" y="135" fill="#89B4FA" font-size="10" font-family="Arial">F'₂</text>
  
  <!-- Object AB at x = 90 (d1 = 15cm -> 60px) -->
  <!-- Height = 20px (from y=120 to y=100) -->
  <draw_arrow>
    <line x1="90" y1="120" x2="90" y2="102" stroke="#F9E2AF" stroke-width="3"/>
    <polygon points="90,100 86,106 94,106" fill="#F9E2AF"/>
  </draw_arrow>
  <text x="80" y="125" fill="#F9E2AF" font-size="12" font-family="Arial" font-weight="bold">A</text>
  <text x="80" y="95" fill="#F9E2AF" font-size="12" font-family="Arial" font-weight="bold">B</text>
  
  <!-- Intermediate Image A1B1 at x = 270 (d'1 = 30cm -> 120px) -->
  <!-- Height = 40px (from y=120 to y=160, inverted) -->
  <line x1="270" y1="120" x2="270" y2="158" stroke="#A6E3A1" stroke-width="2"/>
  <polygon points="270,160 266,154 274,154" fill="#A6E3A1"/>
  <text x="265" y="115" fill="#A6E3A1" font-size="12" font-family="Arial">A₁</text>
  <text x="265" y="175" fill="#A6E3A1" font-size="12" font-family="Arial">B₁</text>
  
  <!-- Final Virtual Image A2B2 at x = 230 (d'2 = -20cm -> -80px) -->
  <!-- Height = 80px (from y=120 to y=200, virtual, inverted relative to axis) -->
  <line x1="230" y1="120" x2="230" y2="197" stroke="#F38BA8" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="230,200 226,194 234,194" fill="#F38BA8"/>
  <text x="220" y="115" fill="#F38BA8" font-size="12" font-family="Arial" font-weight="bold">A₂</text>
  <text x="220" y="215" fill="#F38BA8" font-size="12" font-family="Arial" font-weight="bold">B₂</text>
  
  <!-- Ray 1 from B (parallel to axis to L1, then passes through F'1 to B1) -->
  <line x1="90" y1="100" x2="150" y2="100" stroke="#F9E2AF" stroke-width="1.5"/>
  <line x1="150" y1="100" x2="270" y2="160" stroke="#A6E3A1" stroke-width="1.5"/>
  <!-- Ray 1 continuation to L2 -->
  <line x1="270" y1="160" x2="310" y2="180" stroke="#A6E3A1" stroke-width="1.5"/>
  <!-- Ray 1 refraction through L2 (virtual extension back to B2 at x=230, y=200) -->
  <!-- Optical center of L2 is at 310, 120. B1 is at 270, 160. -->
  <!-- Ray passes through L2 at x=310, y=180. The ray appears to come from virtual image B2(230, 200). -->
  <!-- Direction vector from B2(230,200) to L2(310,180) is (80, -20). Real refracted ray goes to x=390, y=160. -->
  <line x1="310" y1="180" x2="390" y2="160" stroke="#F38BA8" stroke-width="1.5"/>
  <line x1="310" y1="180" x2="230" y2="200" stroke="#F38BA8" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Ray 2 from B (through O1 to B1) -->
  <line x1="90" y1="100" x2="270" y2="160" stroke="#F9E2AF" stroke-width="1.5"/>
  <!-- Ray 2 continuation to L2 -->
  <line x1="270" y1="160" x2="310" y2="173.3" stroke="#A6E3A1" stroke-width="1.5"/>
  <!-- Ray 2 refraction through L2: appears to come from B2(230,200). -->
  <!-- Direction from B2(230,200) to L2 intersection (310,173.3) goes forward. -->
  <line x1="310" y1="173.3" x2="390" y2="146.6" stroke="#F38BA8" stroke-width="1.5"/>
  <line x1="310" y1="173.3" x2="230" y2="200" stroke="#F38BA8" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
