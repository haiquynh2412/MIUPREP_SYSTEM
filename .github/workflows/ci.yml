name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test-packages:
    name: Unit tests (7 packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test -w @miuprep/core -w @miuprep/content -w @miuprep/learning -w @miuprep/db -w @miuprep/knowledge -w @miuprep/ai -w @miuprep/beta

  test-sat:
    name: SAT studio (typecheck + domain tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w sat-studio
      - run: npm run test:public-contract -w sat-studio

  lint:
    name: ESLint (4 apps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint -w miuprep-portal
      - run: npm run typecheck -w miuprep-portal
      - run: npm run lint -w @miuprep/desktop
      - run: npm run lint -w @miuprep/cpe-desktop
      - run: npm run lint -w miumath-app
      - run: npm run typecheck -w miumath-app

  build:
    name: Build all workspaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
